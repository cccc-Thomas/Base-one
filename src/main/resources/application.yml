server:
  port: 8080

spring:
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/his?useSSL=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # 核心连接池配置
      initial-size: 5          # 初始连接数
      min-idle: 5              # 最小空闲连接
      max-active: 20           # 最大活跃连接数
      max-wait: 60000          # 获取连接超时时间（毫秒）

      # 连接检测（防止连接失效）
      test-while-idle: true
      validation-query: SELECT 1

      # 监控统计和防火墙（推荐开启）
      filters: stat,wall

      # 监控页面配置（可选，方便查看连接池状态）
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: 123456
  redis:
    database: 0
    host: localhost
    port: 6379
    password: 123456
  rabbitmq:
    # RabbitMQ 服务地址（本地填 localhost，服务器填对应IP）
    host: localhost
    # RabbitMQ 服务端口（默认 5672，管理后台端口是 15672）
    port: 5672
    # 登录用户名（默认 guest，生产环境建议修改）
    username: guest
    # 登录密码（默认 guest，生产环境建议修改）
    password: guest
    # 虚拟主机（默认 /，多租户场景可创建不同vhost隔离）
    virtual-host: /

    # ======================== 消息可靠性投递配置 ========================
    # 发布者确认模式：correlated 表示开启消息到达交换机的回调
    publisher-confirm-type: correlated
    # 开启消息无法路由到队列的回调
    publisher-returns: true
    template:
      # 强制开启消息路由失败回调（必须配合 publisher-returns: true 使用）
      mandatory: true

    # ======================== 消费者手动 ACK 配置 ========================
    listener:
      simple:
        # 手动签收模式：manual 表示手动控制消息确认，自动模式为 auto
        acknowledge-mode: manual
        # 预取数量：每次从队列拉取1条消息，处理完再拉取下一条（防止消息堆积）
        prefetch: 1
  elasticsearch:
    host: localhost
    port: 9200
    scheme: https
    username: elastic
    password: 8ofGlB-DZc9151rL=lBz
  cache:
    type: caffeine
    cache-names: userCache, productCache  # 预定义的缓存区域
    caffeine:
      spec: initialCapacity=100, maximumSize=10000, expireAfterWrite=60s
  quartz:
    auto-startup: false  # 禁止 Quartz 自动启动
    job-store-type: memory  # 保持原有配置即可
mybatis:
  configuration:
    map-underscore-to-camel-case: true
